workflows:
  android-ios-workflow:
    name: Android + iOS (No Signing IPA)
    max_build_duration: 120

    environment:
      flutter: 3.35.5
      xcode: latest
      cocoapods: default

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      # =========================
      # ANDROID BUILDS
      # =========================

      - name: Build APK (Split per ABI)
        script: |
          flutter build apk --release \
          --split-per-abi \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --build-name=1.2.13 \
          --build-number=14

      - name: Build AAB (Optimized)
        script: |
          flutter build appbundle --release \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --build-name=1.2.13 \
          --build-number=14

      # =========================
      # iOS BUILD (NO SIGNING)
      # =========================

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (No Code Sign)
        script: |
          flutter build ios --release --no-codesign

      - name: Create IPA manually
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload
          zip -r app.ipa Payload

    artifacts:
      # Android
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

      # iOS (manual IPA)
      - build/ios/iphoneos/app.ipa

      # Debug symbols
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: false
