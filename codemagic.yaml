workflows:
  android-workflow:
    name: Android Release Optimized Build
    max_build_duration: 60

    environment:
      flutter: 3.35.5

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      # ✅ Build APK (Split per ABI → MUCH smaller)
      - name: Build APK (Split per ABI)
        script: |
          flutter build apk --release \
          --split-per-abi \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --build-name=1.2.13 \
          --build-number=13

      # ✅ Build AAB (Optimized)
      - name: Build AAB (Optimized)
        script: |
          flutter build appbundle --release \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --build-name=1.2.13 \
          --build-number=13

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: false
