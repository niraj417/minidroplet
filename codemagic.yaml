workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 60

    environment:
      flutter: 3.35.5

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build APK (Release)
        script: |
          flutter build apk --release --build-name=1.2.13 --build-number=13

      - name: Build AAB (Release)
        script: |
          flutter build appbundle --release --build-name=1.2.13 --build-number=13

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: false
