workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tinydroplets.tinydroplets

      vars:
        APP_ID: 6746761853

      flutter: 3.35.5
      xcode: 26.0.1
      cocoapods: 1.16.2

    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Enable Sign in with Apple capability
        script: |
          cat > ios/Runner/Runner.entitlements <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN">
          <plist version="1.0">
          <dict>
              <key>aps-environment</key>
              <string>production</string>
              <key>com.apple.developer.applesignin</key>
              <array>
                  <string>Default</string>
              </array>
          </dict>
          </plist>
          EOF

          /usr/libexec/PlistBuddy -c "Add :CODE_SIGN_ENTITLEMENTS string Runner/Runner.entitlements" ios/Runner.xcodeproj/project.pbxproj || \
          /usr/libexec/PlistBuddy -c "Set :CODE_SIGN_ENTITLEMENTS Runner/Runner.entitlements" ios/Runner.xcodeproj/project.pbxproj

      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release \
          --build-name=1.2.12 \
          --build-number=1

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
