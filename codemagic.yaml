workflows:
  android-release:
    name: Android Play Store Release
    max_build_duration: 60

    environment:
      flutter: 3.35.5

      vars:
        CM_KEYSTORE_PASSWORD: Akshay@2024
        CM_KEY_ALIAS: my-key-alias
        CM_KEY_PASSWORD: Akshay@2024

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      # ✅ Move keystore to correct folder
      - name: Move keystore
        script: |
          cp my-release-key.jks android/app/

      # ✅ Correct signing config (FIXED)
      - name: Set up Android signing
        script: |
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=my-release-key.jks
          EOF

      # ✅ Build signed AAB
      - name: Build Signed AAB
        script: |
          flutter build appbundle --release \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --build-name=1.2.13 \
          --build-number=24

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: false
