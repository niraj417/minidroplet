workflows:
  android-release-aab:
    name: Android Signed AAB Release
    max_build_duration: 60

    environment:
      flutter: 3.35.5

      vars:
        PACKAGE_NAME: com.tinydroplets.tinydroplets

      android_signing:
        - keystore_reference

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build Signed AAB
        script: |
          flutter build appbundle --release \
          --obfuscate \
          --split-debug-info=build/debug-info \
          --build-name=1.2.13 \
          --build-number=14

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - kingniraj417@gmail.com
        notify:
          success: true
          failure: false
