name: tinydroplets
description: "Give shape to ur imagination"
publish_to: "none"

version: 1.0.0+19

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  curved_navigation_bar: ^1.0.6
  dio: ^5.7.0
  flutter_bloc: ^9.1.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.4
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.2
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1
  flutter_spinkit: ^5.2.1
  equatable: ^2.0.7
  glass_kit: ^4.0.1
  carousel_slider: ^5.0.0
  carousel_indicator: ^1.0.6
  package_info_plus: ^8.1.2
  pin_code_fields: ^8.0.1
  get_it: ^8.0.3
  palette_generator: ^0.3.3+5
  flutter_rating: ^2.0.2
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  share_plus: ^10.1.3
  video_player: ^2.9.2
  flutter_pdfview: ^1.4.0
  razorpay_flutter: ^1.4.0
  intl: ^0.20.1
  just_audio_background: ^0.0.1-beta.14
  just_audio: ^0.9.43
  audio_service: ^0.18.16
  pdfx: ^2.8.0
  syncfusion_flutter_pdfviewer: ^32.2.3
  flutter_staggered_grid_view: ^0.7.0
  flick_video_player: ^0.9.0
  image_picker: ^1.1.2
  webview_flutter: ^4.10.0
  permission_handler: ^11.4.0
  onesignal_flutter: ^5.3.0
  google_fonts: ^6.2.2
  flutter_native_splash: ^2.4.6
  in_app_purchase: ^3.2.3
  in_app_purchase_storekit: ^0.4.2
  device_info_plus: ^12.3.0
  flutter_downloader: ^1.12.0
  google_mobile_ads: ^5.3.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1
  sizer: ^3.1.3
  lottie: ^3.3.2
  app_tracking_transparency: ^2.0.6 # ✅ ADDED for Facebook AEM / iOS 14+

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  intl: ^0.20.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/vectors/
    - assets/fonts/
    - assets/lottie_animation/

  fonts:
    - family: PlaywriteUSTrad
      fonts:
        - asset: assets/fonts/PlaywriteUSTrad-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/PlaywriteUSTrad-Light.ttf
          weight: 300
        - asset: assets/fonts/PlaywriteUSTrad-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlaywriteUSTrad-Thin.ttf
          weight: 100

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: BobbyJones
      fonts:
        - asset: assets/fonts/Bobby Jones Soft.otf
          weight: 400
        - asset: assets/fonts/Bobby Jones Soft Outline.otf
          weight: 700

    - family: BobbyRough
      fonts:
        - asset: assets/fonts/Bobby Rough Soft.ttf
          weight: 400
        - asset: assets/fonts/Bobby Rough Soft Outline.ttf
          weight: 700
